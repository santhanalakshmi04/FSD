<html lang ="en">
    <head>
        <link rel="icon" 
        type="image/x-icon" 
        href="https://pngimg.com/uploads/letter_j/letter_j_PNG19.png">

        <meta charset = "UTF-8">
        <meta name ="viewport" content = "width=device-width,initial-scale=1.0">
        <title>Job Application Form</title>
    </head>

    <body bgcolor="#DCCFEC">
        <center>
        
        <h1 align = "center">JOB APPLICATION FORM</h1>

        <form>
            <table cellpadding = "8" cellspacing ="0">

                <tr>
                    <td><label><b>FULL NAME :</b></label></td>
                    <td> <input type ="text" name = "fullname"><br><br></td>
                </tr>

                <tr>
                    <td><label><b>EMAIL ADDRESS :</b></label></td>
                    <td><input type ="text" name = "email"><br><br></td>
                </tr>

                <tr>
                    <td> <label><b>AGE :</b></label></td>
                    <td><input type ="number" name = "age"><br><br></td>

                </tr>

                <tr>
                    <td><label><b>PHONE NUMBER :</b></label></td>
                    <td> <input type ="tel" name ="Phone"><br><br></td>
                </tr>

                <tr>
                    <td><label><b>DATE OF BIRTH :</b></label></td>
                    <td><input type ="date" name ="dob"><br><br></td>
                </tr>

                <tr>
                    <td> <label><b>GENDER :</b></label></td>
                    <td><input type ="radio" name = "gender">Male
                        <input type ="radio" name ="gender">Female<br><br></td>
                </tr>

                <tr>
                    <td><label><b>QUALIFICATION:</b></label></td>
                    <td> <select name ="qualification">
                        <option>B.E</option>
                        <option>B.TECH</option>
                        <option>B.SC</option>
                        <option>MCA</option>
                
                    </select><br><br></td>
                </tr>

                <tr>
                    <td> <label><b>COLLEGE : </b></label></td>
                    <td><input type ="text" name = "college"><br><br></td>
                </tr>

                <tr>
                    <td><label><b>YEAR: </b></label></td>
                    <td><input type ="Year" name = "year"><br><br></td>
                </tr>

                <tr>
                    <td><label><b>PERCENTAGE : </b></label></td>
                    <td><input type ="number" name = "number"></td>
                </tr>

                <tr>

                <td><label><b>SKILLS :</b></label>
                <td><input type ="checkbox">HTML
                <input type ="checkbox">CSS
                <input type ="checkbox">JAVASCRIPT
                <input type ="checkbox">JAVA<br><br></td>
                
                </tr>

                <tr>

                
                <td><label><b>EXPERIENCE:</b></label></td>
                <td><input type = "number" name = "experience">Years<br><br></td>

                </tr>

                <tr>

                <td><label><b>UPLOAD RESUME :</b></label></td>
                <td><input type ="file" name = "resume"><br><br></td>

                </tr>

                <tr>

                <td><label><b>ADDRESS :</b></label></td>
                <td><textarea rows ="5" cols ="30"></textarea><br><br></td>

                </tr>

                <tr>
                <td><label><b>CITY :</b></label></td>
                <td><input type = "text" name = "city"><br><br></td>
                </tr>

                <tr>
                <td><label><b>STATE</b></label></td>
                <td><input type = "text" name = "state"><br><br></td>
                </tr>

                <tr>
                <td><label><b>PINCODE</b></label></td>
                <td><input type = "number" name = "pincode"><br><br></td>
                </tr>

                <tr>
                <td><label for="position"><b>PREFERRED POSITION:</b></label></td>
                <td>
                <select id="position" name="position">
                <option value="">Select Position</option>
                <option value="developer">Developer</option>
                <option value="designer">Designer</option>
                <option value="manager">Manager</option>
                <option value="analyst">Analyst</option>
                </select>
                </td>
                </tr>

                <tr>
                <td><label for="experience"><b>EXPERIENCE:</b></label></td>
                <td><input type="number" id="experience" name="experience" min="0" max="40"></td>
                </tr>

                <tr>
                <td><b>SKILLS:</b></td>
                <td>
                <input type="checkbox" id="html" name="skills" value="HTML">
                <label for="html">HTML</label>
                <input type="checkbox" id="css" name="skills" value="CSS">
                <label for="css">CSS</label>
                <input type="checkbox" id="js" name="skills" value="JavaScript">
                <label for="js">JavaScript</label>
                <input type="checkbox" id="python" name="skills" value="Python">
                <label for="python">Python</label>
                </td>
                </tr>

                <tr>
                    <td><label><b>LINKEDIN / GITHUB PROFILE : </b></label></td>
                    <td><input type ="url"><br><br></td>

                </tr>

                <tr>
                    <td><label><b>DECLARATION SECTION : </b></label></td>
                    <td><input type ="checkbox">I confirm that the details are correct<br><br></td>

                </tr>

                <tr>
                <td><input type ="submit" value ="Apply Now"></td>
                <td><input type ="reset" value ="Clear"></td>

                </tr>

        </table>

        </form>

        
        </center>
    </body>
</html>
