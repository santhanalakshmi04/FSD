<html>
    <head>
        <style>
            h1,h2,h3,h4,p,h5{
                color:orangered;
                background-color:maroon;
                text-align : center;

                text-decoration-line: underline  ;
                text-decoration-color : brown;

                padding-left: 5px;
                padding-right: 5px;
                padding-top: 5px;
                padding-bottom: 5px;


            }
        </style>

    </head>

    <body>
        <h1>GROUP SELECTOR</h1>
        <h2>Uses comma (,) to group elements.</h2>
        <h3>Same style applied to many elements.</p>
        <h4>Reduces repeated code.</p>
        <h5>Makes CSS shorter and cleaner.</h5>
        <h2 >Improves code readability.</h2>
    </body>
</html>
